services:
  aipi-bench:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
    environment:
      - DATABASE_URL=file:/app/data/benchmarks.db
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET must be set}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
    restart: unless-stopped
